name: Tests
on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

permissions:
  checks: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Lint
        continue-on-error: true
        run: uvx ruff check --output-format=github .

      - name: Type check
        continue-on-error: true
        run: uvx ty check --output-format=github

      - name: Run tests
        run: uv run pytest tests --junitxml=junit/test-results.xml --cov=src --cov-report=term --cov-report=xml

      - name: Coverage summary
        if: success() || failure()
        run: uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Test summary
        uses: mikepenz/action-junit-report@v6.4.0
        if: success() || failure()
        with:
          report_paths: './junit/test-results.xml'
